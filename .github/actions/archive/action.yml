name: Archive
description: Archive binaries for deployment

inputs:
  os:
    description: 'OS that the packaging is running on'
    required: true
  artifact:
    description: 'Binary artifact'
    required: true
  archive_type:
    description: 'File type to use for the final package'
    required: true
  branch:
    description: 'Git branch used for this build'
    required: true
  major_version:
    description: 'Sonarr major version'
    required: true
  version:
    description: 'Sonarr version'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Archive Artifact
      uses: thedoctor0/zip-release@0.7.5
      with:
        # wejściowy folder/artefakt do spakowania
        # Zmień jeśli Twój "artifact" nie jest katalogiem w repo.
        root_folder: ${{ inputs.artifact }}

        # gdzie ma trafić wynik (relative do repo; często najlepiej użyć ./)
        target: .

        # nazwa archiwum (zależy od tego, co zip-release przyjmuje)
        # jeśli w Waszym workflow oczekujesz konkretnych nazw, dopasuj ten format
        filename: sonarr-${{ inputs.os }}-${{ inputs.archive_type }}-${{ inputs.version }}.zip

        # opcjonalnie: tworzenie nazwy tagu/branch jeśli jest używane przez action
        # W razie błędu usuń/zmień linie, które nie są zgodne z action inputs.
